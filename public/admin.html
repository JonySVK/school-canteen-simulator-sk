<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulátor školskej jedálne</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css">
    <script src="game/firebase.js" type="module"></script>
    <style>
        .back-btn, .continue-btn {
            padding: 2vh 3vh;
            font-size: 2vh;
            cursor: pointer;
            border: none;
            border-radius: 1vh;
            background-color: #333;
            color: white;
            position: absolute;
            top: 2vh;
            left: 2vh;
        }

        .footer {
            width: 100vh;
            font-size: 2vh;
            color: #333;
            line-height: 1.5;
            padding-top: 0;
        }

        /* celý obsah */
        .about {
            padding: 4vh;
        }

        /* filter bar */
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        /* inputs */
        input {
            padding: 10px;
            width: 220px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        /* buttons */
        button {
            padding: 10px 14px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            background: #333;
            color: white;
        }

        /* 🔥 HLAVNÁ ZMENA: results container */
        #results {
            max-height: 65vh;
            overflow-y: auto;
            padding-right: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* karta */
        .card {
            border: 1px solid #ddd;
            padding: 14px;
            border-radius: 10px;
            background: #fafafa;

            /* FIX pre dlhé texty */
            word-wrap: break-word;
            overflow-wrap: break-word;
            white-space: normal;
        }

        /* zvýraznenie mena */
        .card strong {
            font-size: 16px;
        }

        /* scroll bar (voliteľné, ale lepšie UX) */
        #results::-webkit-scrollbar {
            width: 8px;
        }

        #results::-webkit-scrollbar-thumb {
            background: #bbb;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="about">
    <button class="back-btn" onclick="location.href='index.html'">Späť</button>
    <h2>Firestore filter</h2>

    <div class="filters">
        <input id="codeInput" placeholder="Kód" />
        <input id="schoolInput" placeholder="Škola" />
        <button id="searchBtn">Hľadaj</button>
        <button id="resetBtn">Zobraz všetko</button>
    </div>

    <div id="results"></div>
    <div id="stats"></div>

    <script type="module">
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const auth = getAuth();

onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "index.html"; // alebo login page
  }
});

import { db } from "./game/firebase.js";
import { collection, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

function calculateAverage(data) {
  if (!data.length) return 0;

  const sum = data.reduce((acc, item) => {
    return acc + (Number(item.percent) || 0);
  }, 0);

  return (sum / data.length).toFixed(2);
}
const resultsDiv = document.getElementById("results");
const codeInput = document.getElementById("codeInput");
const schoolInput = document.getElementById("schoolInput");

async function fetchData({ code, school }) {
  let qRef = collection(db, "gameResults");

  const constraints = [];

  if (code) constraints.push(where("code", "==", String(code)));
  if (school) constraints.push(where("schoolId", "==", school));

  // 🔥 orderBy vždy (ak chceš stabilné výsledky)
  constraints.push(orderBy("percent", "desc"));

  qRef = query(qRef, ...constraints);

  const snapshot = await getDocs(qRef);

  return snapshot.docs.map(doc => ({
    id: doc.id,
    ...doc.data()
  }));
}

function render(data) {
  resultsDiv.innerHTML = "";

  if (data.length === 0) {
    resultsDiv.innerHTML = "<p>Žiadne výsledky</p>";
    return;
  }

  const avg = calculateAverage(data);
  const statsDiv = document.getElementById("stats");


  statsDiv.innerHTML = `
    Počet výsledkov: ${data.length} <br>
    Priemer úspešnosti: ${avg} %
  `;

  data.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <strong>${item.studentName || "Anonym"}</strong><br>
      Správnosť: ${item.percent || "-"} %<br>
    `;

    resultsDiv.appendChild(div);
  });
}

// 🔍 search button
document.getElementById("searchBtn").addEventListener("click", async () => {
  const code = codeInput.value.trim();
  const school = schoolInput.value.trim();

  const data = await fetchData({
    code: code || null,
    school: school || null
  });

  render(data);
});

// 🔄 reset button (all data)
document.getElementById("resetBtn").addEventListener("click", async () => {
  codeInput.value = "";
  schoolInput.value = "";

  const data = await fetchData({});
  render(data);
});

// initial load
// fetchData({}).then(render);

    </script>
</div>

</body>
</html>
