                soup,
                main,
                drink: drinkObj?.drinktype
                };
            });
            }
            const meals = buildMeals(weekMenu, mealsDB).filter(m => m.soup && m.main && m.drink);

            if (meals.some(m => !m.soup || !m.main || !m.drink)) {
                alert("Neúplný jedálny lístok");
                }

        // Vytvorenie UI
        norms.forEach(norm => {
            const div = document.createElement("div");
            div.className = "norm";
            div.innerHTML = `<span class="icon">⚪</span> ${norm.text}`;
            container.appendChild(div);
        });

        // Animácia bodiek (ak existuje element)
        const dots = document.getElementById("dots");
        if (dots) {
            let dotCount = 0;
            setInterval(() => {
                dotCount = (dotCount + 1) % 4;
                dots.textContent = '.'.repeat(dotCount);
            }, 500);
        }

        // Kontrola noriem
        async function runChecks() {

            const results = [];

            for (let i = 0; i < norms.length; i++) {
                const div = container.children[i];
                const icon = div.querySelector(".icon");

                // loading
                icon.textContent = "⏳";
                div.scrollIntoView({ behavior: "smooth", block: "center" });

                await new Promise(r => setTimeout(r, 250));

                let passed = false;

                try {
                    // ❗ KĽÚČOVÝ FIX
                    passed = norms[i].condition(meals);
                } catch (e) {
                    console.error("Chyba v norme:", norms[i].text, e);
                    passed = false;
                }

                // UI výsledok
                if (passed) icon.textContent = "✅";
                else icon.textContent = "❌";

                results.push({
                    text: norms[i].text,
                    passed: passed
                });
            }

            // ❗ ukladaj výsledky, nie funkcie
            localStorage.setItem("normResults", JSON.stringify(results));

            // presmerovanie
            window.location.href = "09-result.html";
        }

        // spusti
        runChecks();
    </script>
</body>
