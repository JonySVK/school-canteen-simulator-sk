<!DOCTYPE html>
<!-- Created by Jan Ivicic © 2026 -->
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulátor školskej jedálne</title>
<link rel="icon" type="image/x-icon" href="../favicon.ico">
<script src="firebase.js" type="module"></script>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>

<style>
body {
    margin: 5vh;
    font-family: Arial, sans-serif;
    background-color: #9fd3c7;
    text-align: center;
}

.header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .back-btn, .continue-btn {
            padding: 2vh 3vh;
            font-size: 3vh;
            cursor: pointer;
            border: none;
            border-radius: 1vh;
            background-color: #333;
            color: white;
        }

.meals-container {
    margin-top: 2vh;
    max-height: 50vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    touch-action: pan-y;
    overscroll-behavior: contain;
}

.meal {
    display: flex;
    align-items: center;
    background: white;
    border-radius: 2vh;
    margin-bottom: 1vh;
    padding: 1vh;
    font-size: 3vh;
    touch-action: manipulation;
}

.meal img {
    width: 10vh;
    height: 10vh;
    border-radius: 1vh;
    margin-right: 2vh;
}

.drag-handle {
    cursor: grab;
    font-size: 4vh;
    margin: 2vh;
    user-select: none;
    touch-action: none;
}

.days-container {
    display: flex;
    justify-content: space-between;
    margin-top: 2vh;
}

.day {
    width: 18%;
    min-height: 15vh;
    background: #e0fff9;
    border-radius: 2vh;
    padding: 1vh;
    font-size: 3vh;
    line-height: 1.5;
}

.day-name {
    font-size: 3vh;
    margin-bottom: 1vh;
}

.remove {
    color: lightcoral;
    cursor: pointer;
}

p {
    font-size: 2.5vh;
    color: #333;
}
</style>
</head>

<body>

<div class="header">
    <button class="back-btn" onclick="window.location.href = '04-main-course.html'">Späť</button>
    <h1 style="text-align: center;">Vyber nápoj na každý deň.</h1>
    <button class="continue-btn" onclick="nextPage()">Pokračovať</button>
</div>

<div class="meals-container"></div>

<div class="days-container">
    <div class="day" data-day="Pondelok"><span class="day-name">Pondelok</span></div>
    <div class="day" data-day="Utorok"><span class="day-name">Utorok</span></div>
    <div class="day" data-day="Streda"><span class="day-name">Streda</span></div>
    <div class="day" data-day="Štvrtok"><span class="day-name">Štvrtok</span></div>
    <div class="day" data-day="Piatok"><span class="day-name">Piatok</span></div>
</div>

<p>Potiahnutím presuň Tebou vybraný nápoj do konkrétneho dňa.</p>

<script>
    function checkOrientation() {
        const isPortrait = window.matchMedia("(orientation: portrait)").matches;
        const alreadyShown = sessionStorage.getItem("orientationAlertShown");

        if (isPortrait && !alreadyShown) {
            alert("Odporúčame hrať v režime na šírku (landscape) pre lepšie zobrazovanie a ovládanie hry.");

            // uložíme, že už sme ukázali
            sessionStorage.setItem("orientationAlertShown", "true");
        }
    }

    window.addEventListener("resize", checkOrientation);
    checkOrientation();

const meals = [

{
  name: "Stolová voda",
  type: "water"
},

{
  name: "Minerálna voda",
  type: "water"
},

{
  name: "Čaj nesladený",
  type: "tea"
},

{
  name: "Čaj s citrónom",
  type: "tea"
},

{
  name: "Bylinkový čaj",
  type: "tea"
},

{
  name: "Mlieko",
  type: "milk"
},

{
  name: "Kakao",
  type: "milk"
},

{
  name: "Ochutené mlieko",
  type: "milk"
},

{
  name: "Ovocný džús",
  type: "sweet_drink"
},

{
  name: "Sirupová voda",
  type: "sweet_drink"
}

];

let mealData = {
    Pondelok: null,
    Utorok: null,
    Streda: null,
    Štvrtok: null,
    Piatok: null
};

const mealsContainer = document.querySelector(".meals-container");

/* RENDER meals */
meals.forEach((meal, index) => {
    const div = document.createElement("div");
    div.className = "meal";
    div.dataset.index = index;

    div.innerHTML = `
        <div class="drag-handle">⋮</div>
        ${meal.img ? `<img src="${meal.img}">` : ''}
        <div>${meal.name}</div>
    `;

    mealsContainer.appendChild(div);
});

/* SOURCE */
new Sortable(mealsContainer, {
    group: { name: "meals", pull: "clone", put: false },
    sort: false,
    animation: 150,
    delay: 120,
    delayOnTouchOnly: true
});

/* DAYS */
document.querySelectorAll(".day").forEach(day => {

    new Sortable(day, {
        group: "meals",
        animation: 150,
        handle: ".drag-handle",

        delay: 120,
        delayOnTouchOnly: true,

        forceFallback: false,   // 🔥 KLÚČOVÉ FIX

        onAdd: function (evt) {
          const index = evt.item.dataset.index;
          const meal = meals[index];

          const dayName = evt.to.dataset.day?.trim();

          const storageKeys = {
              Pondelok: "mondayDrink",
              Utorok: "tuesdayDrink",
              Streda: "wednesdayDrink",
              Štvrtok: "thursdayDrink",
              Piatok: "fridayDrink"
          };

          const key = storageKeys[dayName];

          evt.item.remove(); // 🔥 UI fix

          // 🧠 ulož do pamäte
          mealData[dayName] = meal;

          // 💾 ulož do localStorage
          if (key) {
              localStorage.setItem(key, meal.name); 
              // ak chceš ukladať celý objekt:
              // localStorage.setItem(key, JSON.stringify(meal));
          } else {
              console.warn("Neznámy deň:", dayName);
          }

          render(evt.to); // ⚠️ nie "day", ale konkrétny element
      }
    });
});

function render(dayEl) {
    const name = dayEl.dataset.day?.trim();

    const storageKeys = {
        Pondelok: "mondayDrink",
        Utorok: "tuesdayDrink",
        Streda: "wednesdayDrink",
        Štvrtok: "thursdayDrink",
        Piatok: "fridayDrink"
    };

    const key = storageKeys[name];
    const storedMeal = key ? localStorage.getItem(key) : null;
    const meal = mealData[name];

    // 🟢 PRIORITA: localStorage
    const finalMeal = storedMeal || (meal ? meal.name : null);

    // 🧱 základ
    let content = `<div>${name}</div>`;

    if (finalMeal) {
        content += `
        <div>
            <b>Nápoj:</b> <span class="remove">✖</span><br>
            ${finalMeal}
        </div>`;
    }

    dayEl.innerHTML = content;

    // ❌ remove (zmaže aj localStorage aj mealData)
    const removeBtn = dayEl.querySelector(".remove");
    if (removeBtn) {
        removeBtn.onclick = () => {
            if (key) localStorage.removeItem(key);
            mealData[name] = null;
            render(dayEl);
        };
    }
}

document.addEventListener("DOMContentLoaded", () => {
    const days = document.querySelectorAll("[data-day]");
    days.forEach(dayEl => render(dayEl));
});

function nextPage() {
    if (localStorage.getItem("mondayDrink") === null ||
        localStorage.getItem("tuesdayDrink") === null ||
        localStorage.getItem("wednesdayDrink") === null ||
        localStorage.getItem("thursdayDrink") === null ||
        localStorage.getItem("fridayDrink") === null) {
        alert("Vyber nápoj pre každý deň!");
        return;
    }

    window.location.href = "06-summary.html";
}
</script>

</body>
</html>
