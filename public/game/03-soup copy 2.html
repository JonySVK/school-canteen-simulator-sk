<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulátor školskej jedálne</title>
    <link rel="icon" type="image/x-icon" href="../favicon.ico">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
    <style>
        body {
            margin: 5vh;
            font-family: Arial, sans-serif;
            background-color: #9fd3c7;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .back-btn, .continue-btn {
            padding: 2vh 3vh;
            font-size: 3vh;
            cursor: pointer;
            border: none;
            border-radius: 1vh;
            background-color: #333;
            color: white;
        }

        .meals-container {
            margin-top: 2vh;
            max-height: 50vh;
            gap: 1vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-y;
            scroll-behavior: smooth;
            overscroll-behavior: contain;
        }

        .meal {
            display: flex;
            align-items: center;
            border: 1px solid #333;
            border-radius: 2vh;
            padding: 1vh;
            margin-bottom: 1vh;
            background-color: white;
            font-size: 3.5vh;
            touch-action: none;
            will-change: transform;
            touch-action: manipulation;
        }


        .meal img {
            width: 10vh;
            height: 10vh;
            border-radius: 1vh;
            margin-right: 2vh;
            object-fit: cover;
        }

        .meal img:hover {
            width: 20vh;
            height: 20vh;
        }

        .drag-handle {
            cursor: grab;
            margin: 2vh;
            font-size: 4vh;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            pointer-events: none;
        }

        .meal-info {
            flex-grow: 1;
        }

        .meal-labels {
            margin-left: 1vh;
            font-weight: bold;
        }

        .days-container {
            display: flex;
            justify-content: space-between;
            margin-top: 2.5vh;
            font-size: 3vh;
            gap: 2vh;
        }

        .day {
            width: 18%;
            min-height: 15vh;
            border-radius: 2vh;
            padding: 1vh;
            text-align: center;
            font-weight: bold;
            background-color: #e0fff9;
            position: relative;
            border: 1vh dashed transparent;
            will-change: transform;
        }

        .day:hover {
            border-color: green;
        }

        .remove {
            color: red;
            cursor: pointer;
            font-weight: bold;
        }

        p {
            font-size: 2.5vh;
            color: #333;
            width: 75vw;
            line-height: 1.75;
        }

        h1 {
            font-size: 6vh;
            color: #333;
            margin: 2vh 0;
            width: 75vw;
        }

        a {
            color: #333;
        }
    </style>
</head>
<body>
    
        <div class="header">
            <h1>Teraz vyber polievku na každý deň...</h1>
            <button class="continue-btn" onclick="nextPage()">POKRAČOVAŤ</button>
        </div>

        <div class="meals-container">
            <!-- Tu sa dynamicky generujú jedlá -->
        </div>

        <div class="days-container">
            <div class="day" data-day="Pondelok">
                <div class="day-title">Pondelok</div>
                <div class="day-content"></div>
            </div>
            <div class="day" data-day="Utorok">
                <div class="day-title">Utorok</div>
                <div class="day-content"></div>
            </div>
            <div class="day" data-day="Streda">
                <div class="day-title">Streda</div>
                <div class="day-content"></div>
            </div>
            <div class="day" data-day="Štvrtok">
                <div class="day-title">Štvrtok</div>
                <div class="day-content"></div>
            </div>
            <div class="day" data-day="Piatok">
                <div class="day-title">Piatok</div>
                <div class="day-content"></div>
            </div>
        </div>

        <p style="text-align: left;">Potiahnutím presuň Tebou vybranú polievku do konkrétneho dňa.</p>

        <script>
            const meals = [
                {
                    img: "https://i.natgeofe.com/n/aed9f829-849c-4902-88bb-27e570c2a398/GettyImages-180258510.jpg",
                    name: "Knedlo vepřo zelo Knedlo vepřo zelo Knedlo vepřo zelo Knedlo vepřo zelo Knedlo vepřo zelo Knedlo vepřo zelo Knedlo vepřo zelo Knedlo vepřo zelo Knedlo vepřo zelo",
                    ingredients: "Pstruh, voda, korenie",
                    procedure: "Postup 1",
                    labels: ["VIAC"]
                },
                {
                    img: "https://i.natgeofe.com/n/aed9f829-849c-4902-88bb-27e570c2a398/GettyImages-180258510.jpg",
                    name: "Ryba so zemiakov",
                    ingredients: "Ryba, zemiak, mlieko",
                    procedure: "Postup 2",
                    labels: ["VIAC"]
                },{
                    img: "https://i.natgeofe.com/n/aed9f829-849c-4902-88bb-27e570c2a398/GettyImages-180258510.jpg",
                    name: "Knedlo vepřo zelo",
                    ingredients: "Pstruh, voda, korenie",
                    procedure: "Postup 1",
                    labels: ["VIAC"]
                },
                {
                    img: "https://i.natgeofe.com/n/aed9f829-849c-4902-88bb-27e570c2a398/GettyImages-180258510.jpg",
                    name: "Ryba so zemiakov",
                    ingredients: "Ryba, zemiak, mlieko",
                    procedure: "Postup 2",
                    labels: ["VIAC"]
                },{
                    img: "https://i.natgeofe.com/n/aed9f829-849c-4902-88bb-27e570c2a398/GettyImages-180258510.jpg",
                    name: "Knedlo vepřo zelo",
                    ingredients: "Pstruh, voda, korenie",
                    procedure: "Postup 1",
                    labels: ["VIAC"]
                },
                {
                    img: "https://i.natgeofe.com/n/aed9f829-849c-4902-88bb-27e570c2a398/GettyImages-180258510.jpg",
                    name: "Ryba so zemiakov",
                    ingredients: "Ryba, zemiak, mlieko",
                    procedure: "Postup 2",
                    labels: ["VIAC"]
                },{
                    img: "https://i.natgeofe.com/n/aed9f829-849c-4902-88bb-27e570c2a398/GettyImages-180258510.jpg",
                    name: "Knedlo vepřo zelo",
                    ingredients: "Pstruh, voda, korenie",
                    procedure: "Postup 1",
                    labels: ["VIAC"]
                },
                {
                    img: "https://i.natgeofe.com/n/aed9f829-849c-4902-88bb-27e570c2a398/GettyImages-180258510.jpg",
                    name: "Ryba so zemiakov",
                    ingredients: "Ryba, zemiak, mlieko",
                    procedure: "Postup 2",
                    labels: ["VIAC"]
                },{
                    img: "https://i.natgeofe.com/n/aed9f829-849c-4902-88bb-27e570c2a398/GettyImages-180258510.jpg",
                    name: "Knedlo vepřo zelo",
                    ingredients: "Pstruh, voda, korenie",
                    procedure: "Postup 1",
                    labels: ["VIAC"]
                },
                {
                    img: "https://i.natgeofe.com/n/aed9f829-849c-4902-88bb-27e570c2a398/GettyImages-180258510.jpg",
                    name: "Ryba so zemiakov",
                    ingredients: "Ryba, zemiak, mlieko",
                    procedure: "Postup 2",
                    labels: ["VIAC"]
                },{
                    img: "https://i.natgeofe.com/n/aed9f829-849c-4902-88bb-27e570c2a398/GettyImages-180258510.jpg",
                    name: "Knedlo vepřo zelo",
                    ingredients: "Pstruh, voda, korenie",
                    procedure: "Postup 1",
                    labels: ["VIAC"]
                },
                {
                    img: "https://i.natgeofe.com/n/aed9f829-849c-4902-88bb-27e570c2a398/GettyImages-180258510.jpg",
                    name: "Ryba so zemiakov",
                    ingredients: "Ryba, zemiak, mlieko",
                    procedure: "Postup 2",
                    labels: ["VIAC"]
                },
                // Tu môžeš pridať ďalšie jedlá
            ];

            let mealData = {
                Pondelok: null,
                Utorok: null,
                Streda: null,
                Štvrtok: null,
                Piatok: null
            };

            const mealsContainer = document.querySelector(".meals-container");

            function truncate(text, max) {
                return text.length > max ? text.slice(0, max) + "..." : text;
            }

            /* =========================
            RENDER MEALS
            ========================= */
            document.addEventListener("DOMContentLoaded", () => {

                meals.forEach((meal, index) => {
                    const mealDiv = document.createElement("div");
                    mealDiv.className = "meal";
                    mealDiv.dataset.index = index;

                    mealDiv.innerHTML = `
                        <div class="drag-handle">⋮</div>
                        <img src="${meal.img}" alt="${meal.name}">
                        <div class="meal-info">
                            <div class="meal-name"><strong>${truncate(meal.name, 80)}</strong></div>
                            <div class="meal-ingredients">${truncate(meal.ingredients, 80)}</div>
                        </div>
                    `;

                    mealsContainer.appendChild(mealDiv);
                });

                /* =========================
                SOURCE LIST
                ========================= */
                new Sortable(mealsContainer, {
                    group: {
                        name: "meals",
                        pull: "clone",
                        put: false
                    },
                    sort: false,
                    animation: 150
                });

                /* =========================
                DAYS (DROP ZONES)
                ========================= */
                document.querySelectorAll(".day").forEach(day => {

                    new Sortable(day, {
                        group: "meals",
                        animation: 150,

                        delay: 80,
                        delayOnTouchOnly: true,

                        forceFallback: true,
                        touchStartThreshold: 10,

                        easing: "cubic-bezier(0.2, 0.8, 0.2, 1)",


                        onAdd: function (evt) {

                            const dayName = evt.to.dataset.day;
                            const content = evt.to.querySelector(".day-content");

                            const index = evt.item.dataset.index;
                            const meal = meals[index];

                            // ❌ odstráň clone item (dôležité pre výkon)
                            evt.item.remove();

                            // ✔ STATE ONLY
                            mealData[dayName] = meal;

                            // ✔ render
                            renderDay(evt.to);
                        }
                    });
                });

                // initial render
                document.querySelectorAll(".day").forEach(renderDay);
            });


            /* =========================
            RENDER FUNCTION (CORE FIX)
            ========================= */
            function renderDay(dayEl) {
                const dayName = dayEl.dataset.day;
                const content = dayEl.querySelector(".day-content");
                const meal = mealData[dayName];

                if (!meal) {
                    content.innerHTML = "";
                    return;
                }

                content.innerHTML = `
                    Polievka: <span class="remove">✖</span><br>
                    <strong>${meal.name}</strong>
                `;

                content.querySelector(".remove").onclick = () => {
                    mealData[dayName] = null;
                    renderDay(dayEl);
                };
            }


            /* =========================
            NEXT PAGE
            ========================= */
            function nextPage() {

                const values = Object.values(mealData);

                if (values.includes(null)) {
                    alert("Nevybral si polievku na všetky dni!");
                    return;
                }

                try {
                    localStorage.setItem("mondaySoup", mealData["Pondelok"].name);
                    localStorage.setItem("tuesdaySoup", mealData["Utorok"].name);
                    localStorage.setItem("wednesdaySoup", mealData["Streda"].name);
                    localStorage.setItem("thursdaySoup", mealData["Štvrtok"].name);
                    localStorage.setItem("fridaySoup", mealData["Piatok"].name);
                } catch (e) {
                    console.error(e);
                    alert("Ukladanie nefunguje.");
                    return;
                }

                window.location.href = "04-main-course.html";
            }

        </script>
</body>
</html>
