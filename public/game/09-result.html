<!DOCTYPE html>
<!-- Created by Jan Ivicic © 2026 -->
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulátor školskej jedálne</title>
    <link rel="icon" type="image/x-icon" href="../favicon.ico">
    <link rel="stylesheet" href="../style.css">
    <script src="firebase.js" type="module"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #9fd3c7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            color: #333;
        }

        .center {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    gap: 2vh;
                }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .check-container {
            margin-top: 1vh;
            max-height: 60vh;
            min-width: 40vw;
            overflow-y: auto;
        }

        .norm {
            font-size: 2vh;
            margin-bottom: 1vh;
        }

        .norm .icon {
            display: inline-block;
            width: 2vh;
            text-align: center;
            margin-right: 1vh;
            font-weight: bold;
        }

        .check-container {
            margin-top: 2vh;
            max-height: 40vh;
            min-width: 40vw;
            overflow-y: auto;
        }

        .norm {
            font-size: 2vh;
            margin-bottom: 1vh;
        }

        .toggle {
            margin-top: 2vh;
            cursor: pointer;
        }

        .footer-buttons {
            display: flex;
            justify-content: space-around;
            margin-top: 2vh;
            gap: 5vh;
        }

        .footer-buttons button {
            padding: 2vh 3vh;
            font-size: 2vh;
            border: none;
            border-radius: 2vh;
            background-color: #333;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 id="score" style="width: 100%"></h1><abbr title="V tejto hre sú použité len vybrané normy. V realite ich jedálne musia spĺňať oveľa viac." style="font-size: 6vh; color: #333; text-decoration: none;"> *</abbr>
        </div>

        <div class="check-container" style="font-size: 3vh; color: #333;">
            <div id="failed-norms">
                <!-- Nesplnené normy -->
            </div>

            <div id="toggle-succeeded" class="toggle">
                <span id="toggle-btn" style="font-size: 2vh; color: #333;">▼ Zobraziť splnené</span>
                <div id="succeeded-norms" style="display:none;">
                    <!-- Splnené normy -->
                </div>
            </div>
        </div>

        <h2 id="result-message" style="font-size: 4vh;"></h2>

        <div class="footer-buttons">
            <button onclick="location.href='03-soup.html'">SKÚSIŤ ZNOVA</button>
            <button onclick="localStorage.clear(); window.location.href = '10-end1.html';">UKONČIŤ HRU</button>
        </div>

        <p style="font-size: 2vh;"><i>* Poznámka: V tejto hre sú použité len vybrané normy. V realite ich jedálne musia spĺňať oveľa viac.</i></p>
    </div>

    <script type="module">
        function checkOrientation() {
        const isPortrait = window.matchMedia("(orientation: portrait)").matches;
        const alreadyShown = sessionStorage.getItem("orientationAlertShown");

        if (isPortrait && !alreadyShown) {
            alert("Odporúčame hrať v režime na šírku (landscape) pre lepšie zobrazovanie a ovládanie hry.");

            // uložíme, že už sme ukázali
            sessionStorage.setItem("orientationAlertShown", "true");
        }
    }

    window.addEventListener("resize", checkOrientation);
    checkOrientation();

        import { saveGameResult } from "./gameResults.js";

        // Príklad noriem zo stránky checking.html
        const norms = JSON.parse(localStorage.getItem("normResults"));

        const failedContainer = document.getElementById("failed-norms");
        const succeededContainer = document.getElementById("succeeded-norms");

        const totalNorms = norms.length;
        const passedNorms = norms.filter(n => n.passed).length;

        document.getElementById("score").textContent = `Tvoj jedálniček splnil ${passedNorms} z ${totalNorms} noriem.`;

        if (totalNorms === passedNorms) {
            document.getElementById("result-message").textContent = "Gratulujeme! Tvoj jedálniček splnil všetky normy! Jedáleň by ho mohla uvariť.";
        } else {
            document.getElementById("result-message").textContent = "Tvoj jedálniček by jedáleň žiaľ nemohla uvariť. Nesplnil si všetky normy.";
        }

        norms.forEach(norm => {
            const div = document.createElement("div");
            div.className = "norm";

            if (norm.passed) {
                div.innerHTML = `✅ ${norm.text}`;
                succeededContainer.appendChild(div);
            } else {
                div.innerHTML = `❌ ${norm.text}`;
                failedContainer.appendChild(div);
            }
        });

        const toggleBtn = document.getElementById("toggle-btn");
        toggleBtn.addEventListener("click", () => {
            const display = succeededContainer.style.display;
            if (display === "none") {
                succeededContainer.style.display = "block";
                toggleBtn.textContent = "▲ Skryť splnené";
            } else {
                succeededContainer.style.display = "none";
                toggleBtn.textContent = "▼ Zobraziť splnené";
            }
        });

        async function endGame() {
            const percent = Math.round((passedNorms / totalNorms) * 100);

            await saveGameResult({
                percent,
                studentName: localStorage.getItem("studentName"),
                className: localStorage.getItem("studentClass"),
                code: localStorage.getItem("studentCode"),
                schoolId: localStorage.getItem("studentSchool")
            });

        }

        if (localStorage.getItem("saved") !== "true") {
            endGame();
        }

        localStorage.setItem("saved", "true");
    </script>
</body>
</html>
