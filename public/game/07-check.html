<div class="container">
    <h1 id="introText" style="width: 70vw;">Teraz prebehne kontrola Tvojho jedálnička, či spĺňa všetky normy od Ministerstva školstva.</h1>

    <a href="08-checking.html">
        <button>POKRAČOVAŤ</button>
    </a>
</div>

<script>
    function checkOrientation() {
        const isPortrait = window.matchMedia("(orientation: portrait)").matches;
        const alreadyShown = sessionStorage.getItem("orientationAlertShown");

        if (isPortrait && !alreadyShown) {
            alert("Odporúčame hrať v režime na šírku (landscape) pre lepšie zobrazovanie a ovládanie hry.");

            // uložíme, že už sme ukázali
            sessionStorage.setItem("orientationAlertShown", "true");
        }
    }

    window.addEventListener("resize", checkOrientation);
    checkOrientation();
</script>

</body>
</html>
