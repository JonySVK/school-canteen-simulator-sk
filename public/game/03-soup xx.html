<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulátor školskej jedálne</title>
    <link rel="icon" type="image/x-icon" href="../favicon.ico">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
    <style>
        body {
            margin: 5vh;
            font-family: Arial, sans-serif;
            background-color: #9fd3c7;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .back-btn, .continue-btn {
            padding: 2vh 3vh;
            font-size: 3vh;
            cursor: pointer;
            border: none;
            border-radius: 1vh;
            background-color: #333;
            color: white;
        }

        .meals-container {
            margin-top: 2vh;
            max-height: 50vh;
            gap: 1vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-y;
            scroll-behavior: smooth;
            overscroll-behavior: contain;
        }

        .meal {
            display: flex;
            border: 1px solid #333;
            border-radius: 2vh;
            padding: 1vh;
            margin-bottom: 1vh;
            font-size: 3.5vh;
            align-items: center;
            background: white;
            user-select: none;
            touch-action: none;
        }

        .meal.dragging {
            opacity: 0.6;
            position: fixed;
            z-index: 9999;
            pointer-events: none;
        }

        .meal img {
            width: 10vh;
            height: 10vh;
            border-radius: 1vh;
            margin-right: 2vh;
            object-fit: cover;
        }

        .meal img:hover {
            width: 20vh;
            height: 20vh;
        }

        .drag-handle {
            cursor: grab;
            margin: 2vh;
            font-size: 4vh;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            pointer-events: none;
        }

        .meal-info {
            flex-grow: 1;
        }

        .meal-labels {
            margin-left: 1vh;
            font-weight: bold;
        }

        .days-container {
            display: flex;
            justify-content: space-between;
            margin-top: 2.5vh;
            font-size: 3vh;
            gap: 2vh;
        }

        .day {
            width: 18%;
            min-height: 15vh;
            border-radius: 2vh;
            padding: 1vh;
            text-align: center;
            font-weight: bold;
            background-color: #e0fff9;
            position: relative;
            border: 1vh dashed transparent;
            will-change: transform;
        }

        .day.active {
            border-color: green;
        }

        .remove {
            color: red;
            cursor: pointer;
            font-weight: bold;
        }

        p {
            font-size: 2.5vh;
            color: #333;
            width: 75vw;
            line-height: 1.75;
        }

        h1 {
            font-size: 6vh;
            color: #333;
            margin: 2vh 0;
            width: 75vw;
        }

        a {
            color: #333;
        }
    </style>
</head>
<body>
    
        <div class="header">
            <h1>Teraz vyber polievku na každý deň...</h1>
            <button class="continue-btn" onclick="nextPage()">POKRAČOVAŤ</button>
        </div>

        <div class="meals-container">
            <!-- Tu sa dynamicky generujú jedlá -->
        </div>

        <div class="days-container">
            <div class="day" data-day="Pondelok">
                <div class="day-title">Pondelok</div>
                <div class="day-content"></div>
            </div>
            <div class="day" data-day="Utorok">
                <div class="day-title">Utorok</div>
                <div class="day-content"></div>
            </div>
            <div class="day" data-day="Streda">
                <div class="day-title">Streda</div>
                <div class="day-content"></div>
            </div>
            <div class="day" data-day="Štvrtok">
                <div class="day-title">Štvrtok</div>
                <div class="day-content"></div>
            </div>
            <div class="day" data-day="Piatok">
                <div class="day-title">Piatok</div>
                <div class="day-content"></div>
            </div>
        </div>

        <p style="text-align: left;">Potiahnutím presuň Tebou vybranú polievku do konkrétneho dňa.</p>

        <script>
            const meals = [
                {
                    img: "https://i.natgeofe.com/n/aed9f829-849c-4902-88bb-27e570c2a398/GettyImages-180258510.jpg",
                    name: "Knedlo vepřo zelo Knedlo vepřo zelo Knedlo vepřo zelo Knedlo vepřo zelo Knedlo vepřo zelo Knedlo vepřo zelo Knedlo vepřo zelo Knedlo vepřo zelo Knedlo vepřo zelo",
                    ingredients: "Pstruh, voda, korenie",
                    procedure: "Postup 1",
                    labels: ["VIAC"]
                },
                {
                    img: "https://i.natgeofe.com/n/aed9f829-849c-4902-88bb-27e570c2a398/GettyImages-180258510.jpg",
                    name: "Ryba so zemiakov",
                    ingredients: "Ryba, zemiak, mlieko",
                    procedure: "Postup 2",
                    labels: ["VIAC"]
                },{
                    img: "https://i.natgeofe.com/n/aed9f829-849c-4902-88bb-27e570c2a398/GettyImages-180258510.jpg",
                    name: "Knedlo vepřo zelo",
                    ingredients: "Pstruh, voda, korenie",
                    procedure: "Postup 1",
                    labels: ["VIAC"]
                },
                {
                    img: "https://i.natgeofe.com/n/aed9f829-849c-4902-88bb-27e570c2a398/GettyImages-180258510.jpg",
                    name: "Ryba so zemiakov",
                    ingredients: "Ryba, zemiak, mlieko",
                    procedure: "Postup 2",
                    labels: ["VIAC"]
                },{
                    img: "https://i.natgeofe.com/n/aed9f829-849c-4902-88bb-27e570c2a398/GettyImages-180258510.jpg",
                    name: "Knedlo vepřo zelo",
                    ingredients: "Pstruh, voda, korenie",
                    procedure: "Postup 1",
                    labels: ["VIAC"]
                },
                {
                    img: "https://i.natgeofe.com/n/aed9f829-849c-4902-88bb-27e570c2a398/GettyImages-180258510.jpg",
                    name: "Ryba so zemiakov",
                    ingredients: "Ryba, zemiak, mlieko",
                    procedure: "Postup 2",
                    labels: ["VIAC"]
                },{
                    img: "https://i.natgeofe.com/n/aed9f829-849c-4902-88bb-27e570c2a398/GettyImages-180258510.jpg",
                    name: "Knedlo vepřo zelo",
                    ingredients: "Pstruh, voda, korenie",
                    procedure: "Postup 1",
                    labels: ["VIAC"]
                },
                {
                    img: "https://i.natgeofe.com/n/aed9f829-849c-4902-88bb-27e570c2a398/GettyImages-180258510.jpg",
                    name: "Ryba so zemiakov",
                    ingredients: "Ryba, zemiak, mlieko",
                    procedure: "Postup 2",
                    labels: ["VIAC"]
                },{
                    img: "https://i.natgeofe.com/n/aed9f829-849c-4902-88bb-27e570c2a398/GettyImages-180258510.jpg",
                    name: "Knedlo vepřo zelo",
                    ingredients: "Pstruh, voda, korenie",
                    procedure: "Postup 1",
                    labels: ["VIAC"]
                },
                {
                    img: "https://i.natgeofe.com/n/aed9f829-849c-4902-88bb-27e570c2a398/GettyImages-180258510.jpg",
                    name: "Ryba so zemiakov",
                    ingredients: "Ryba, zemiak, mlieko",
                    procedure: "Postup 2",
                    labels: ["VIAC"]
                },{
                    img: "https://i.natgeofe.com/n/aed9f829-849c-4902-88bb-27e570c2a398/GettyImages-180258510.jpg",
                    name: "Knedlo vepřo zelo",
                    ingredients: "Pstruh, voda, korenie",
                    procedure: "Postup 1",
                    labels: ["VIAC"]
                },
                {
                    img: "https://i.natgeofe.com/n/aed9f829-849c-4902-88bb-27e570c2a398/GettyImages-180258510.jpg",
                    name: "Ryba so zemiakov",
                    ingredients: "Ryba, zemiak, mlieko",
                    procedure: "Postup 2",
                    labels: ["VIAC"]
                },
                // Tu môžeš pridať ďalšie jedlá
            ];

            const mealsContainer = document.querySelector(".meals-container");
            const days = document.querySelectorAll(".day");

            let mealData = {
                Pondelok: null,
                Utorok: null,
                Streda: null,
                Štvrtok: null,
                Piatok: null
            };

            let draggedMeal = null;
            let ghost = null;

            // ------------------------
            // RENDER MEALS
            // ------------------------
            meals.forEach((meal, index) => {

                const el = document.createElement("div");
                el.className = "meal";
                el.dataset.index = index;

                el.innerHTML = `
                    <img src="${meal.img}" style="width:60px;height:60px;margin-right:10px;">
                    <div><strong>${meal.name}</strong></div>
                `;

                // START DRAG
                el.addEventListener("pointerdown", (e) => {

                    draggedMeal = {
                        index,
                        element: el
                    };

                    ghost = el.cloneNode(true);
                    ghost.classList.add("dragging");
                    document.body.appendChild(ghost);

                    moveGhost(e);
                });

                mealsContainer.appendChild(el);
            });

            // ------------------------
            // MOVE GHOST
            // ------------------------
            function moveGhost(e) {
                if (!ghost) return;

                ghost.style.left = e.pageX + "px";
                ghost.style.top = e.pageY + "px";
            }

            // ------------------------
            // GLOBAL MOVE
            // ------------------------
            document.addEventListener("pointermove", (e) => {
                if (!ghost) return;

                moveGhost(e);

                days.forEach(day => {
                    const rect = day.getBoundingClientRect();

                    const inside =
                        e.clientX >= rect.left &&
                        e.clientX <= rect.right &&
                        e.clientY >= rect.top &&
                        e.clientY <= rect.bottom;

                    day.classList.toggle("active", inside);
                });
            });

            // ------------------------
            // DROP
            // ------------------------
            document.addEventListener("pointerup", (e) => {

                if (!ghost || !draggedMeal) return;

                let dropped = false;

                days.forEach(day => {

                    const rect = day.getBoundingClientRect();

                    const inside =
                        e.clientX >= rect.left &&
                        e.clientX <= rect.right &&
                        e.clientY >= rect.top &&
                        e.clientY <= rect.bottom;

                    if (inside) {
                        const index = draggedMeal.index;
                        const meal = meals[index];

                        mealData[day.dataset.day] = meal;

                        renderDay(day);

                        dropped = true;
                    }

                    day.classList.remove("active");
                });

                ghost.remove();
                ghost = null;
                draggedMeal = null;
            });

            // ------------------------
            // RENDER DAY
            // ------------------------
            function renderDay(day) {

                const content = day.querySelector(".day-content");
                const meal = mealData[day.dataset.day];

                if (!meal) {
                    content.innerHTML = "";
                    return;
                }

                content.innerHTML = `
                    <strong>${meal.name}</strong>
                    <span class="remove">✖</span>
                `;

                content.querySelector(".remove").onclick = () => {
                    mealData[day.dataset.day] = null;
                    renderDay(day);
                };
            }

            // ------------------------
            // NEXT PAGE
            // ------------------------
            function nextPage() {

                if (Object.values(mealData).includes(null)) {
                    alert("Nevybral si všetky dni!");
                    return;
                }

                localStorage.setItem("menu", JSON.stringify(mealData));

                window.location.href = "04-main-course.html";
            }

        </script>
</body>
</html>
