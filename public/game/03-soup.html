<!DOCTYPE html>

<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulátor školskej jedálne</title>
<link rel="icon" type="image/x-icon" href="../favicon.ico">
<script src="firebase.js" type="module"></script>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>

<style>
body {
    margin: 5vh;
    font-family: Arial, sans-serif;
    background-color: #9fd3c7;
    text-align: center;
}

.header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .back-btn, .continue-btn {
            padding: 2vh 3vh;
            font-size: 3vh;
            cursor: pointer;
            border: none;
            border-radius: 1vh;
            background-color: #333;
            color: white;
        }

.meals-container {
    margin-top: 2vh;
    max-height: 50vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    touch-action: pan-y;
    overscroll-behavior: contain;
}

.meal {
    display: flex;
    align-items: center;
    background: white;
    border-radius: 2vh;
    margin-bottom: 1vh;
    padding: 1vh;
    font-size: 3vh;
    touch-action: manipulation;
}

.meal img {
    width: 10vh;
    height: 10vh;
    border-radius: 1vh;
    margin-right: 2vh;
}

.drag-handle {
    cursor: grab;
    font-size: 4vh;
    margin: 2vh;
    user-select: none;
    touch-action: none;
}

.days-container {
    display: flex;
    justify-content: space-between;
    margin-top: 2vh;
}

.day {
    width: 18%;
    min-height: 15vh;
    background: #e0fff9;
    border-radius: 2vh;
    padding: 1vh;
    font-size: 3vh;
    line-height: 1.5;
}

.day-name {
    font-size: 3vh;
    margin-bottom: 1vh;
}

.remove {
    color: lightcoral;
    cursor: pointer;
}

p {
    font-size: 2.5vh;
    color: #333;
}
</style>
</head>

<body>

<div class="header">
    <button class="back-btn" onclick="window.location.href = '02-intro2.html'">Späť</button>
    <h1 style="text-align: center;">Vyber polievku na každý deň.</h1>
    <button class="continue-btn" onclick="nextPage()">Pokračovať</button>
</div>

<div class="meals-container"></div>

<div class="days-container">
    <div class="day" data-day="Pondelok"><span class="day-name">Pondelok</span></div>
    <div class="day" data-day="Utorok"><span class="day-name">Utorok</span></div>
    <div class="day" data-day="Streda"><span class="day-name">Streda</span></div>
    <div class="day" data-day="Štvrtok"><span class="day-name">Štvrtok</span></div>
    <div class="day" data-day="Piatok"><span class="day-name">Piatok</span></div>
</div>

<p>Potiahnutím presuň Tebou vybranú polievku do konkrétneho dňa.</p>

<script>
    function checkOrientation() {
        const isPortrait = window.matchMedia("(orientation: portrait)").matches;
        const alreadyShown = sessionStorage.getItem("orientationAlertShown");

        if (isPortrait && !alreadyShown) {
            alert("Odporúčame hrať v režime na šírku (landscape) pre lepšie zobrazovanie a ovládanie hry.");

            // uložíme, že už sme ukázali
            sessionStorage.setItem("orientationAlertShown", "true");
        }
    }

    window.addEventListener("resize", checkOrientation);
    checkOrientation();
    
    localStorage.setItem("saved", "false");

const meals = [
        {
        name: "Zeleninová polievka",
        tags: ["vegetables", "light"],
        nutrition: { energy: 120, fat: 3 }
        },

        {
        name: "Kuracia polievka s rezancami",
        tags: ["meat", "chicken"],
        nutrition: { energy: 180, fat: 6 }
        },

        {
        name: "Hovädzia polievka s rezancami",
        tags: ["meat", "beef"],
        nutrition: { energy: 200, fat: 7 }
        },

        {
        name: "Paradajková polievka",
        tags: ["vegetables", "light"],
        nutrition: { energy: 130, fat: 3 }
        },

        {
        name: "Šošovicová polievka",
        tags: ["legumes", "vegetables"],
        nutrition: { energy: 220, fat: 5 }
        },

        {
        name: "Fazuľová polievka",
        tags: ["legumes"],
        nutrition: { energy: 230, fat: 6 }
        },

        {
        name: "Fazuľová polievka s mäsom",
        tags: ["legumes", "meat", "heavy"],
        nutrition: { energy: 320, fat: 12 }
        },

        {
        name: "Cesnaková polievka",
        tags: ["vegetables", "light"],
        nutrition: { energy: 110, fat: 3 }
        },

        {
        name: "Zemiaková polievka",
        tags: ["vegetables"],
        nutrition: { energy: 190, fat: 5 }
        },

        {
        name: "Kapustová polievka",
        tags: ["vegetables"],
        nutrition: { energy: 170, fat: 4 }
        },

        {
        name: "Kapustnica s mäsom",
        tags: ["meat", "heavy"],
        nutrition: { energy: 350, fat: 15 }
        },

        {
        name: "Brokolicová krémová polievka",
        tags: ["vegetables", "dairy", "light"],
        nutrition: { energy: 210, fat: 10 }
        },

        {
        name: "Tekvicová polievka",
        tags: ["vegetables", "light"],
        nutrition: { energy: 160, fat: 6 }
        },

        {
        name: "Hrachová polievka",
        tags: ["legumes"],
        nutrition: { energy: 240, fat: 5 }
        },

        {
        name: "Hrachová polievka s údeným mäsom",
        tags: ["legumes", "meat", "heavy"],
        nutrition: { energy: 330, fat: 13 }
        },

        {
        name: "Cibuľová polievka",
        tags: ["vegetables"],
        nutrition: { energy: 150, fat: 5 }
        },

        {
        name: "Krúpová polievka",
        tags: ["vegetables"],
        nutrition: { energy: 200, fat: 4 }
        },

        {
        name: "Ryžová polievka",
        tags: ["vegetables", "rice"],
        nutrition: { energy: 190, fat: 3 }
        },

        {
        name: "Špenátová polievka",
        tags: ["vegetables"],
        nutrition: { energy: 180, fat: 7 }
        },

        {
        name: "Karfiolová polievka",
        tags: ["vegetables"],
        nutrition: { energy: 170, fat: 4 }
        }

        ];

let mealData = {
    Pondelok: null,
    Utorok: null,
    Streda: null,
    Štvrtok: null,
    Piatok: null
};

const mealsContainer = document.querySelector(".meals-container");

/* RENDER meals */
meals.forEach((meal, index) => {
    const div = document.createElement("div");
    div.className = "meal";
    div.dataset.index = index;

    div.innerHTML = `
        <div class="drag-handle">⋮</div>
        ${meal.img ? `<img src="${meal.img}">` : ''}
        <div>${meal.name}</div>
    `;

    mealsContainer.appendChild(div);
});

/* SOURCE */
new Sortable(mealsContainer, {
    group: { name: "meals", pull: "clone", put: false },
    sort: false,
    animation: 150,
    delay: 120,
    delayOnTouchOnly: true
});

/* DAYS */
document.querySelectorAll(".day").forEach(day => {

    new Sortable(day, {
        group: "meals",
        animation: 150,
        handle: ".drag-handle",

        delay: 120,
        delayOnTouchOnly: true,

        forceFallback: false,   // 🔥 KLÚČOVÉ FIX

        onAdd: function (evt) {
          const index = evt.item.dataset.index;
          const meal = meals[index];

          const dayName = evt.to.dataset.day?.trim();

          const storageKeys = {
              Pondelok: "mondaySoup",
              Utorok: "tuesdaySoup",
              Streda: "wednesdaySoup",
              Štvrtok: "thursdaySoup",
              Piatok: "fridaySoup"
          };

          const key = storageKeys[dayName];

          evt.item.remove(); // 🔥 UI fix

          // 🧠 ulož do pamäte
          mealData[dayName] = meal;

          // 💾 ulož do localStorage
          if (key) {
              localStorage.setItem(key, meal.name); 
              // ak chceš ukladať celý objekt:
              // localStorage.setItem(key, JSON.stringify(meal));
          } else {
              console.warn("Neznámy deň:", dayName);
          }

          render(evt.to); // ⚠️ nie "day", ale konkrétny element
      }
    });
});

function render(dayEl) {
    const name = dayEl.dataset.day?.trim();

    const storageKeys = {
        Pondelok: "mondaySoup",
        Utorok: "tuesdaySoup",
        Streda: "wednesdaySoup",
        Štvrtok: "thursdaySoup",
        Piatok: "fridaySoup"
    };

    const key = storageKeys[name];
    const storedMeal = key ? localStorage.getItem(key) : null;
    const meal = mealData[name];

    // 🟢 PRIORITA: localStorage
    const finalMeal = storedMeal || (meal ? meal.name : null);

    // 🧱 základ
    let content = `<div>${name}</div>`;

    if (finalMeal) {
        content += `
        <div>
            <b>Polievka:</b> <span class="remove">✖</span><br>
            ${finalMeal}
        </div>`;
    }

    dayEl.innerHTML = content;

    // ❌ remove (zmaže aj localStorage aj mealData)
    const removeBtn = dayEl.querySelector(".remove");
    if (removeBtn) {
        removeBtn.onclick = () => {
            if (key) localStorage.removeItem(key);
            mealData[name] = null;
            render(dayEl);
        };
    }
}

document.addEventListener("DOMContentLoaded", () => {
    const days = document.querySelectorAll("[data-day]");
    days.forEach(dayEl => render(dayEl));
});

function nextPage() {
    if (localStorage.getItem("mondaySoup") === null ||
        localStorage.getItem("tuesdaySoup") === null ||
        localStorage.getItem("wednesdaySoup") === null ||
        localStorage.getItem("thursdaySoup") === null ||
        localStorage.getItem("fridaySoup") === null) {
        alert("Vyber polievku pre každý deň!");
        return;
    }

    window.location.href = "04-main-course.html";
}
</script>

</body>
</html>
